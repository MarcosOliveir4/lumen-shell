version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      day: "monday"

    commit-message:
      prefix: "chore(deps)"
      include: "scope"

    groups:
      angular-framework:
        patterns:
          - "@angular/*"
        update-types:
          - "minor"
          - "patch"

      rxjs-and-zone:
        patterns:
          - "rxjs"
          - "zone.js"

      tooling-and-lint:
        patterns:
          - "prettier"
          - "eslint"
          - "eslint-plugin-*"
          - "@typescript-eslint/*"

    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
